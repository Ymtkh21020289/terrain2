<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ミニ・テラリア風ゲーム v2</title>
    <style>
        body {
            text-align: center;
            background-color: #2c3e50;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            background-color: #87CEEB;
            border: 4px solid #34495e;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            cursor: crosshair;
        }
        .controls {
            margin-top: 10px;
            display: inline-block;
            text-align: left;
            background-color: #34495e;
            padding: 10px 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>ミニ・テラリア風プロトタイプ v2</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div class="controls">
        <strong>【操作方法】</strong><br>
        * 移動： <code>A</code> / <code>D</code> キー<br>
        * ジャンプ： <code>W</code> キー<br>
        * ブロック選択： <code>1</code> キー (草) / <code>2</code> キー (土)<br>
        * 破壊： マウス <b>左クリック</b><br>
        * 設置： マウス <b>右クリック</b>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const TILE_SIZE = 40;
    const COLS = canvas.width / TILE_SIZE;
    const ROWS = canvas.height / TILE_SIZE;
    const REACH = TILE_SIZE * 5; // 手が届く距離（5ブロック分）

    // インベントリと選択中のブロック
    const inventory = { 1: 0, 2: 0 }; // 1:草, 2:土
    let selectedBlock = 1;

    // キー入力とマウスの管理
    const keys = { a: false, d: false, w: false };
    let mouseX = 0, mouseY = 0;
    let targetTile = null; // 現在狙っているタイルの情報

    window.addEventListener("keydown", (e) => {
        if (e.key === "a" || e.key === "A") keys.a = true;
        if (e.key === "d" || e.key === "D") keys.d = true;
        if (e.key === "w" || e.key === "W") keys.w = true;
        if (e.key === "1") selectedBlock = 1;
        if (e.key === "2") selectedBlock = 2;
    });
    window.addEventListener("keyup", (e) => {
        if (e.key === "a" || e.key === "A") keys.a = false;
        if (e.key === "d" || e.key === "D") keys.d = false;
        if (e.key === "w" || e.key === "W") keys.w = false;
    });

    // マウス位置の追跡
    canvas.addEventListener("mousemove", (e) => {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
        mouseY = e.clientY - rect.top;
    });

    // 右クリックメニューを禁止
    canvas.addEventListener("contextmenu", e => e.preventDefault());

    // クリックで破壊と設置
    canvas.addEventListener("mousedown", (e) => {
        if (!targetTile) return;

        if (e.button === 0) { 
            // 左クリック：破壊
            if (targetTile.isBlock) {
                const blockType = world[targetTile.row][targetTile.col];
                inventory[blockType]++; // インベントリに追加
                world[targetTile.row][targetTile.col] = 0; // 空にする
            }
        } else if (e.button === 2) { 
            // 右クリック：設置
            if (!targetTile.isBlock && inventory[selectedBlock] > 0) {
                // プレイヤーの位置と重ならないかチェック
                if (!isCollidingWithPlayer(targetTile.col, targetTile.row)) {
                    inventory[selectedBlock]--; // 消費
                    world[targetTile.row][targetTile.col] = selectedBlock; // 設置
                }
            }
        }
    });

    // ワールドマップの生成
    const world = [];
    for (let r = 0; r < Math.floor(ROWS); r++) {
        let row = [];
        for (let c = 0; c < Math.floor(COLS); c++) {
            if (r < 8) row.push(0);
            else if (r === 8) row.push(1);
            else row.push(2);
        }
        world.push(row);
    }

    const player = {
        x: 400, y: 100,
        width: 30, height: 40,
        vx: 0, vy: 0,
        speed: 4, jumpPower: -10, gravity: 0.5,
        grounded: false
    };

    function getTile(x, y) {
        const col = Math.floor(x / TILE_SIZE);
        const row = Math.floor(y / TILE_SIZE);
        if (row >= 0 && row < ROWS && col >= 0 && col < COLS) return world[row][col];
        return 0;
    }

    // プレイヤーと指定したマスが重なっているか判定
    function isCollidingWithPlayer(col, row) {
        const tx = col * TILE_SIZE;
        const ty = row * TILE_SIZE;
        return (player.x < tx + TILE_SIZE && 
                player.x + player.width > tx && 
                player.y < ty + TILE_SIZE && 
                player.y + player.height > ty);
    }

    // 視線判定（レイキャスト）でターゲットマスを決定
    function updateTargetTile() {
        targetTile = null;
        const px = player.x + player.width / 2;
        const py = player.y + player.height / 2;
        
        const dx = mouseX - px;
        const dy = mouseY - py;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist > REACH) return; // 届かない距離

        // プレイヤーの中心からマウスに向けて少しずつ進みながらチェック
        const steps = dist / 2; 
        const stepX = dx / steps;
        const stepY = dy / steps;
        
        let cx = px;
        let cy = py;
        
        for (let i = 0; i <= steps; i++) {
            const col = Math.floor(cx / TILE_SIZE);
            const row = Math.floor(cy / TILE_SIZE);
            
            if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
                if (world[row][col] !== 0) {
                    // 障害物（ブロック）にぶつかったらそこがターゲット
                    targetTile = { col: col, row: row, isBlock: true };
                    return;
                }
            }
            cx += stepX;
            cy += stepY;
        }
        
        // 障害物がなくマウス位置に到達した場合（設置用）
        const mCol = Math.floor(mouseX / TILE_SIZE);
        const mRow = Math.floor(mouseY / TILE_SIZE);
        if (mRow >= 0 && mRow < ROWS && mCol >= 0 && mCol < COLS) {
            targetTile = { col: mCol, row: mRow, isBlock: false };
        }
    }

    function update() {
        if (keys.a) player.vx = -player.speed;
        else if (keys.d) player.vx = player.speed;
        else player.vx = 0;

        if (keys.w && player.grounded) {
            player.vy = player.jumpPower;
            player.grounded = false;
        }

        player.vy += player.gravity;

        player.x += player.vx;
        if (player.vx > 0) {
            if (getTile(player.x + player.width, player.y) !== 0 || getTile(player.x + player.width, player.y + player.height - 1) !== 0) {
                player.x = Math.floor((player.x + player.width) / TILE_SIZE) * TILE_SIZE - player.width;
            }
        } else if (player.vx < 0) {
            if (getTile(player.x, player.y) !== 0 || getTile(player.x, player.y + player.height - 1) !== 0) {
                player.x = Math.floor(player.x / TILE_SIZE) * TILE_SIZE + TILE_SIZE;
            }
        }

        player.y += player.vy;
        player.grounded = false;
        if (player.vy > 0) {
            if (getTile(player.x, player.y + player.height) !== 0 || getTile(player.x + player.width - 1, player.y + player.height) !== 0) {
                player.y = Math.floor((player.y + player.height) / TILE_SIZE) * TILE_SIZE - player.height;
                player.vy = 0;
                player.grounded = true;
            }
        } else if (player.vy < 0) {
            if (getTile(player.x, player.y) !== 0 || getTile(player.x + player.width - 1, player.y) !== 0) {
                player.y = Math.floor(player.y / TILE_SIZE) * TILE_SIZE + TILE_SIZE;
                player.vy = 0;
            }
        }

        if (player.x < 0) player.x = 0;
        if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
        if (player.y > canvas.height) { player.y = 0; player.vy = 0; }

        // マウスのターゲットを更新
        updateTargetTile();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // マップ描画
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const tile = world[r][c];
                if (tile !== 0) {
                    if (tile === 1) ctx.fillStyle = "#2ecc71"; // 草
                    else if (tile === 2) ctx.fillStyle = "#8e44ad"; // 土
                    
                    ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    ctx.strokeStyle = "rgba(0,0,0,0.2)";
                    ctx.strokeRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                }
            }
        }

        // ターゲットのハイライト
        if (targetTile) {
            ctx.strokeStyle = "rgba(255, 255, 0, 0.9)"; // 黄色
            ctx.lineWidth = 3;
            ctx.strokeRect(targetTile.col * TILE_SIZE, targetTile.row * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            ctx.lineWidth = 1; // 元に戻す
        }

        // プレイヤー描画
        ctx.fillStyle = "#e74c3c";
        ctx.fillRect(player.x, player.y, player.width, player.height);

        // インベントリUIの描画
        ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
        ctx.fillRect(10, 10, 130, 80);
        
        ctx.fillStyle = "white";
        ctx.font = "16px sans-serif";
        ctx.fillText(`[1] 草: ${inventory[1]} 個`, 20, 35);
        ctx.fillText(`[2] 土: ${inventory[2]} 個`, 20, 65);

        // 選択中ブロックの枠線
        ctx.strokeStyle = "#f1c40f"; // ゴールド
        ctx.lineWidth = 2;
        if (selectedBlock === 1) ctx.strokeRect(15, 18, 120, 24);
        if (selectedBlock === 2) ctx.strokeRect(15, 48, 120, 24);
        ctx.lineWidth = 1;
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
