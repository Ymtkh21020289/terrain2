<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ミニ・テラリア風ゲーム v3 (スクロール対応)</title>
    <style>
        body {
            text-align: center;
            background-color: #2c3e50;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            background-color: #87CEEB;
            border: 4px solid #34495e;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            cursor: crosshair;
        }
        .controls {
            margin-top: 10px;
            display: inline-block;
            text-align: left;
            background-color: #34495e;
            padding: 10px 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>ミニ・テラリア風プロトタイプ v3</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div class="controls">
        <strong>【操作方法】</strong><br>
        * 移動： <code>A</code> / <code>D</code> キー<br>
        * ジャンプ： <code>W</code> キー<br>
        * ブロック選択： <code>1</code> キー (草) / <code>2</code> キー (土)<br>
        * 破壊： マウス <b>左クリック</b><br>
        * 設置： マウス <b>右クリック</b>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const TILE_SIZE = 40;
    // ワールド全体の広さ（画面よりずっと大きい）
    const WORLD_COLS = 100; // 横に100マス (4000ピクセル)
    const WORLD_ROWS = 30;  // 縦に30マス (1200ピクセル)
    const REACH = TILE_SIZE * 5;

    const inventory = { 1: 0, 2: 0 };
    let selectedBlock = 1;
    const keys = { a: false, d: false, w: false };
    
    // マウス座標（画面上の純粋な位置）
    let rawMouseX = 0, rawMouseY = 0;
    let targetTile = null;

    // カメラ（画面に映す範囲）
    const camera = { x: 0, y: 0 };

    window.addEventListener("keydown", (e) => {
        if (e.key === "a" || e.key === "A") keys.a = true;
        if (e.key === "d" || e.key === "D") keys.d = true;
        if (e.key === "w" || e.key === "W") keys.w = true;
        if (e.key === "1") selectedBlock = 1;
        if (e.key === "2") selectedBlock = 2;
    });
    window.addEventListener("keyup", (e) => {
        if (e.key === "a" || e.key === "A") keys.a = false;
        if (e.key === "d" || e.key === "D") keys.d = false;
        if (e.key === "w" || e.key === "W") keys.w = false;
    });

    canvas.addEventListener("mousemove", (e) => {
        const rect = canvas.getBoundingClientRect();
        rawMouseX = e.clientX - rect.left;
        rawMouseY = e.clientY - rect.top;
    });

    canvas.addEventListener("contextmenu", e => e.preventDefault());

    canvas.addEventListener("mousedown", (e) => {
        if (!targetTile) return;

        if (e.button === 0) { 
            if (targetTile.isBlock) {
                const blockType = world[targetTile.row][targetTile.col];
                inventory[blockType]++;
                world[targetTile.row][targetTile.col] = 0;
            }
        } else if (e.button === 2) { 
            if (!targetTile.isBlock && inventory[selectedBlock] > 0) {
                if (!isCollidingWithPlayer(targetTile.col, targetTile.row)) {
                    inventory[selectedBlock]--;
                    world[targetTile.row][targetTile.col] = selectedBlock;
                }
            }
        }
    });

    // 自然な起伏のあるワールドを生成
    const world = [];
    for (let r = 0; r < WORLD_ROWS; r++) {
        let row = [];
        for (let c = 0; c < WORLD_COLS; c++) {
            // 列ごとに地面の高さ（波）を計算
            let surfaceLevel = 10 + Math.floor(Math.sin(c * 0.15) * 3);
            
            if (r < surfaceLevel) row.push(0); // 空
            else if (r === surfaceLevel) row.push(1); // 草
            else row.push(2); // 土
        }
        world.push(row);
    }

    // プレイヤーの初期位置をワールドの中央付近へ
    const player = {
        x: (WORLD_COLS * TILE_SIZE) / 2, 
        y: 0,
        width: 30, height: 40,
        vx: 0, vy: 0,
        speed: 5, jumpPower: -11, gravity: 0.6,
        grounded: false
    };

    function getTile(x, y) {
        const col = Math.floor(x / TILE_SIZE);
        const row = Math.floor(y / TILE_SIZE);
        if (row >= 0 && row < WORLD_ROWS && col >= 0 && col < WORLD_COLS) return world[row][col];
        return 0;
    }

    function isCollidingWithPlayer(col, row) {
        const tx = col * TILE_SIZE;
        const ty = row * TILE_SIZE;
        return (player.x < tx + TILE_SIZE && 
                player.x + player.width > tx && 
                player.y < ty + TILE_SIZE && 
                player.y + player.height > ty);
    }

    function updateTargetTile() {
        targetTile = null;
        // マウスの絶対座標（カメラ位置 + 画面上のマウス位置）
        const absoluteMouseX = rawMouseX + camera.x;
        const absoluteMouseY = rawMouseY + camera.y;

        const px = player.x + player.width / 2;
        const py = player.y + player.height / 2;
        
        const dx = absoluteMouseX - px;
        const dy = absoluteMouseY - py;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist > REACH) return; 

        const steps = dist / 2; 
        const stepX = dx / steps;
        const stepY = dy / steps;
        
        let cx = px;
        let cy = py;
        
        for (let i = 0; i <= steps; i++) {
            const col = Math.floor(cx / TILE_SIZE);
            const row = Math.floor(cy / TILE_SIZE);
            
            if (row >= 0 && row < WORLD_ROWS && col >= 0 && col < WORLD_COLS) {
                if (world[row][col] !== 0) {
                    targetTile = { col: col, row: row, isBlock: true };
                    return;
                }
            }
            cx += stepX;
            cy += stepY;
        }
        
        const mCol = Math.floor(absoluteMouseX / TILE_SIZE);
        const mRow = Math.floor(absoluteMouseY / TILE_SIZE);
        if (mRow >= 0 && mRow < WORLD_ROWS && mCol >= 0 && mCol < WORLD_COLS) {
            targetTile = { col: mCol, row: mRow, isBlock: false };
        }
    }

    function update() {
        if (keys.a) player.vx = -player.speed;
        else if (keys.d) player.vx = player.speed;
        else player.vx = 0;

        if (keys.w && player.grounded) {
            player.vy = player.jumpPower;
            player.grounded = false;
        }

        player.vy += player.gravity;

        player.x += player.vx;
        if (player.vx > 0) {
            if (getTile(player.x + player.width, player.y) !== 0 || getTile(player.x + player.width, player.y + player.height - 1) !== 0) {
                player.x = Math.floor((player.x + player.width) / TILE_SIZE) * TILE_SIZE - player.width;
            }
        } else if (player.vx < 0) {
            if (getTile(player.x, player.y) !== 0 || getTile(player.x, player.y + player.height - 1) !== 0) {
                player.x = Math.floor(player.x / TILE_SIZE) * TILE_SIZE + TILE_SIZE;
            }
        }

        player.y += player.vy;
        player.grounded = false;
        if (player.vy > 0) {
            if (getTile(player.x, player.y + player.height) !== 0 || getTile(player.x + player.width - 1, player.y + player.height) !== 0) {
                player.y = Math.floor((player.y + player.height) / TILE_SIZE) * TILE_SIZE - player.height;
                player.vy = 0;
                player.grounded = true;
            }
        } else if (player.vy < 0) {
            if (getTile(player.x, player.y) !== 0 || getTile(player.x + player.width - 1, player.y) !== 0) {
                player.y = Math.floor(player.y / TILE_SIZE) * TILE_SIZE + TILE_SIZE;
                player.vy = 0;
            }
        }

        // ワールドの端から落ちないように制限
        if (player.x < 0) player.x = 0;
        if (player.x + player.width > WORLD_COLS * TILE_SIZE) player.x = WORLD_COLS * TILE_SIZE - player.width;
        if (player.y > WORLD_ROWS * TILE_SIZE) { // ワールドの底に落ちたら空からリスポーン
            player.y = 0; 
            player.vy = 0; 
        }

        // カメラの更新（プレイヤーを中心に）
        camera.x = player.x + player.width / 2 - canvas.width / 2;
        camera.y = player.y + player.height / 2 - canvas.height / 2;

        // カメラがワールド外にはみ出さないように制御
        camera.x = Math.max(0, Math.min(camera.x, WORLD_COLS * TILE_SIZE - canvas.width));
        camera.y = Math.max(0, Math.min(camera.y, WORLD_ROWS * TILE_SIZE - canvas.height));

        updateTargetTile();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // カメラのスクロールを適用して描画
        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // 画面に映っている範囲だけを描画（最適化）
        const startCol = Math.max(0, Math.floor(camera.x / TILE_SIZE));
        const endCol = Math.min(WORLD_COLS, startCol + Math.ceil(canvas.width / TILE_SIZE) + 1);
        const startRow = Math.max(0, Math.floor(camera.y / TILE_SIZE));
        const endRow = Math.min(WORLD_ROWS, startRow + Math.ceil(canvas.height / TILE_SIZE) + 1);

        for (let r = startRow; r < endRow; r++) {
            for (let c = startCol; c < endCol; c++) {
                const tile = world[r][c];
                if (tile !== 0) {
                    if (tile === 1) ctx.fillStyle = "#2ecc71";
                    else if (tile === 2) ctx.fillStyle = "#8e44ad";
                    
                    ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    ctx.strokeStyle = "rgba(0,0,0,0.2)";
                    ctx.strokeRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                }
            }
        }

        if (targetTile) {
            ctx.strokeStyle = "rgba(255, 255, 0, 0.9)";
            ctx.lineWidth = 3;
            ctx.strokeRect(targetTile.col * TILE_SIZE, targetTile.row * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            ctx.lineWidth = 1;
        }

        ctx.fillStyle = "#e74c3c";
        ctx.fillRect(player.x, player.y, player.width, player.height);

        // スクロールの影響をリセット（UIは画面に固定するため）
        ctx.restore();

        // UIの描画
        ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
        ctx.fillRect(10, 10, 130, 80);
        
        ctx.fillStyle = "white";
        ctx.font = "16px sans-serif";
        ctx.fillText(`[1] 草: ${inventory[1]} 個`, 20, 35);
        ctx.fillText(`[2] 土: ${inventory[2]} 個`, 20, 65);

        ctx.strokeStyle = "#f1c40f";
        ctx.lineWidth = 2;
        if (selectedBlock === 1) ctx.strokeRect(15, 18, 120, 24);
        if (selectedBlock === 2) ctx.strokeRect(15, 48, 120, 24);
        ctx.lineWidth = 1;
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
