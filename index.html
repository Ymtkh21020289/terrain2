<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ミニ・テラリア風ゲーム v6 (流体＆ファイル分割)</title>
    <style>
        body {
            text-align: center;
            background-color: #2c3e50;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 10px;
        }
        canvas {
            background-color: #87CEEB;
            border: 4px solid #34495e;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            cursor: crosshair;
        }
        .controls {
            margin-top: 10px;
            display: inline-block;
            text-align: left;
            background-color: #34495e;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
        }
        .highlight { color: #f1c40f; font-weight: bold; }
        .craft { color: #2ecc71; font-weight: bold; }
        .fluid { color: #3498db; font-weight: bold; }
    </style>
</head>
<body>

    <h1>ミニ・テラリア風プロトタイプ v6</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div class="controls">
        <strong>【操作方法】</strong><br>
        * 移動： <code>A</code> / <code>D</code>　ジャンプ： <code>W</code><br>
        * アクション： マウス <b>左クリック長押し(破壊/回収)</b> / <b>右クリック(設置)</b><br>
        * スロット選択： <code>1</code> ～ <code>9</code> キー<br>
        * <span class="craft">クラフト&インベントリ： <code>E</code> キー</span><br>
    </div>

    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
